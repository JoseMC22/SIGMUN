# OpenSpec — SIGMUN Project Configuration
# Auto-generated by SDD init

context: |
  SIGMUN (Sistema Integral de Gestión Municipal) — SAT ICA.
  Monorepo pnpm workspace with backend/ (NestJS 11, mssql driver, passport-jwt auth)
  and frontend/ (Next.js 16 App Router, Tailwind CSS v4, React 19, lucide-react).
  Clean Architecture design in both packages. SQL Server database via stored procedures.
  No ORM. Zod for validation.

persistence:
  mode: hybrid

strict_tdd: true

testing:
  backend:
    runner: jest
    command: pnpm --filter backend test
    test_match: src/**/*.spec.ts
    coverage: pnpm --filter backend test:cov
    e2e: pnpm --filter backend test:e2e
    e2e_match: test/**/*.e2e-spec.ts
    framework: "@nestjs/testing + supertest"
  frontend:
    runner: vitest
    command: pnpm --filter frontend test
    test_match: src/**/*.{test,spec}.{ts,tsx}
    coverage: none
    e2e: none
    framework: "@testing-library/react + jsdom"
  strict_tdd: true
  quality:
    linter: eslint
    type_checker: typescript
    formatter: prettier

layers:
  - proposal
  - spec
  - design
  - tasks
  - apply
  - verify
  - archive

stack:
  backend:
    runtime: Node.js
    framework: NestJS 11
    language: TypeScript 5.7
    database: SQL Server (mssql v12, no ORM)
    auth: passport-jwt (HttpOnly cookies)
    validation: zod
    testing: Jest 30 + @nestjs/testing
  frontend:
    runtime: Node.js
    framework: Next.js 16 (App Router)
    language: TypeScript 5.x
    styling: Tailwind CSS v4 + postcss
    ui: lucide-react, framer-motion
    testing: Vitest 1.x + @testing-library/react

project_skills:
  - openspec/standards/SKILL.md
